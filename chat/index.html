<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和桑榆对话</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #0a0a12; color: #e2e2f0; height:100vh; display:flex; flex-direction:column;
  }

  /* ─── Header ─── */
  .header {
    display:flex; align-items:center; gap:12px; padding:14px 20px;
    background: linear-gradient(135deg, #12121e 0%, #1a1a2e 100%);
    border-bottom: 1px solid #1e1e30; flex-shrink:0;
  }
  .avatar {
    width:40px; height:40px; border-radius:50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .header-info h1 { font-size:16px; font-weight:600; }
  .header-info p { font-size:12px; color:#8888a0; margin-top:2px; }
  .header-status {
    margin-left:auto; display:flex; align-items:center; gap:6px;
    font-size:12px; color:#22c55e;
  }
  .status-dot {
    width:8px; height:8px; border-radius:50%; background:#22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ─── Messages ─── */
  .messages {
    flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px;
    scroll-behavior:smooth;
  }
  .messages::-webkit-scrollbar { width:5px; }
  .messages::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }

  .msg { display:flex; gap:10px; max-width:85%; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg.assistant { align-self:flex-start; }

  .msg-avatar {
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:15px;
  }
  .msg.user .msg-avatar { background:#333; }
  .msg.assistant .msg-avatar { background:linear-gradient(135deg,#6366f1,#8b5cf6); }

  .msg-bubble {
    padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.7;
    word-break:break-word; white-space:pre-wrap;
  }
  .msg.user .msg-bubble {
    background:linear-gradient(135deg,#6366f1,#7c3aed); color:#fff;
    border-bottom-right-radius:4px;
  }
  .msg.assistant .msg-bubble {
    background:#1a1a2e; color:#e2e2f0; border:1px solid #2a2a3a;
    border-bottom-left-radius:4px;
  }

  /* Markdown in assistant messages */
  .msg.assistant .msg-bubble code {
    background:rgba(99,102,241,.15); padding:2px 6px; border-radius:4px;
    font-family:"SF Mono",Menlo,monospace; font-size:13px; color:#a5b4fc;
  }
  .msg.assistant .msg-bubble pre {
    background:#0d0d1a; border:1px solid #2a2a3a; border-radius:8px;
    padding:12px; margin:8px 0; overflow-x:auto;
  }
  .msg.assistant .msg-bubble pre code { background:none; padding:0; font-size:12px; }

  /* Thinking indicator */
  .thinking { display:flex; gap:4px; padding:8px 4px; }
  .thinking span {
    width:7px; height:7px; border-radius:50%; background:#6366f1;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .thinking span:nth-child(2) { animation-delay:.2s; }
  .thinking span:nth-child(3) { animation-delay:.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

  /* ─── Input Bar ─── */
  .input-bar {
    display:flex; align-items:flex-end; gap:10px; padding:16px 20px;
    background:#12121e; border-top:1px solid #1e1e30; flex-shrink:0;
  }
  .input-bar textarea {
    flex:1; background:#1a1a2e; border:1.5px solid #2a2a3a; border-radius:12px;
    padding:10px 14px; color:#e2e2f0; font-size:14px; font-family:inherit;
    resize:none; outline:none; min-height:44px; max-height:160px; line-height:1.5;
    transition: border-color .2s;
  }
  .input-bar textarea:focus { border-color:#6366f1; }
  .input-bar textarea::placeholder { color:#555570; }

  .send-btn {
    width:44px; height:44px; border-radius:12px; border:none; cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff;
    display:flex; align-items:center; justify-content:center;
    transition: all .2s; flex-shrink:0;
  }
  .send-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(99,102,241,.4); }
  .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .send-btn svg { width:20px; height:20px; }

  /* ─── Welcome ─── */
  .welcome {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:16px; color:#555570; text-align:center;
    padding:40px;
  }
  .welcome-icon {
    width:80px; height:80px; border-radius:24px;
    background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.15));
    display:flex; align-items:center; justify-content:center; font-size:36px;
  }
  .welcome h2 { font-size:20px; color:#8888a0; font-weight:600; }
  .welcome p { font-size:13px; line-height:1.6; max-width:360px; }
  .quick-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
  .quick-btn {
    padding:8px 16px; border-radius:20px; border:1px solid #2a2a3a;
    background:transparent; color:#8888a0; font-size:13px; cursor:pointer;
    transition: all .2s;
  }
  .quick-btn:hover { border-color:#6366f1; color:#a5b4fc; background:rgba(99,102,241,.08); }

  /* ─── Settings Drawer ─── */
  .settings-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(4px);
    z-index:100; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .settings-overlay.open { opacity:1; pointer-events:all; }
  .settings-drawer {
    position:fixed; top:0; right:-400px; width:380px; height:100vh;
    background:#12121e; border-left:1px solid #1e1e30; z-index:101;
    transition: right .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column;
  }
  .settings-drawer.open { right:0; }
  .settings-drawer h3 { font-size:16px; font-weight:600; padding:20px; border-bottom:1px solid #1e1e30; }
  .settings-drawer .fields { flex:1; overflow-y:auto; padding:20px; }
  .field-group { margin-bottom:16px; }
  .field-group label { display:block; font-size:12px; color:#8888a0; margin-bottom:6px; }
  .field-group input {
    width:100%; padding:10px 12px; background:#1a1a2e; border:1px solid #2a2a3a;
    border-radius:8px; color:#e2e2f0; font-size:13px; outline:none; font-family:inherit;
  }
  .field-group input:focus { border-color:#6366f1; }
  .settings-drawer .actions { padding:16px 20px; border-top:1px solid #1e1e30; }
  .btn-save {
    width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff;
    font-size:14px; font-weight:500; transition:all .2s;
  }
  .btn-save:hover { box-shadow:0 4px 16px rgba(99,102,241,.4); }

  /* ─── Mobile ─── */
  @media (max-width:640px) {
    .msg { max-width:92%; }
    .settings-drawer { width:100%; right:-100%; }
    .header-info h1 { font-size:15px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="avatar">🌅</div>
  <div class="header-info">
    <h1>桑榆</h1>
    <p>你的 AI 助手 · 在线</p>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    已连接
  </div>
  <button onclick="toggleSettings()" style="margin-left:12px;background:none;border:1px solid #2a2a3a;border-radius:8px;padding:8px 12px;color:#8888a0;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .2s" onmouseover="this.style.borderColor='#6366f1';this.style.color='#a5b4fc'" onmouseout="this.style.borderColor='#2a2a3a';this.style.color='#8888a0'">
    ⚙️ 设置
  </button>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🌅</div>
    <h2>你好，我是桑榆</h2>
    <p>有什么需要帮忙的？可以直接和我对话，就像在飞书里一样。</p>
    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('帮我分析一张海报')">🎨 分析海报</button>
      <button class="quick-btn" onclick="sendQuick('帮我写一段文案')">✍️ 写文案</button>
      <button class="quick-btn" onclick="sendQuick('现在几点了')">⏰ 现在几点</button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <textarea id="input" rows="1" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)"
    oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<!-- Settings Drawer -->
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
<div class="settings-drawer" id="settingsDrawer">
  <h3>⚙️ 对话设置</h3>
  <div class="fields">
    <div class="field-group">
      <label>Gateway 地址</label>
      <input id="cfgEndpoint" type="text" placeholder="http://127.0.0.1:18789">
    </div>
    <div class="field-group">
      <label>Auth Token</label>
      <input id="cfgToken" type="password" placeholder="Gateway token">
    </div>
    <div class="field-group">
      <label>会话 Key（留空自动分配）</label>
      <input id="cfgSession" type="text" placeholder="可选，指定固定 session">
    </div>
  </div>
  <div class="actions">
    <button class="btn-save" onclick="saveSettings()">保存设置</button>
  </div>
</div>

<script>
// ============================================================
// Config
// ============================================================
const STORAGE_KEY = 'sangyu_chat_config';
const DEFAULT_CFG = {
  endpoint: location.origin.includes('localhost') ? 'http://127.0.0.1:18789' : 'http://127.0.0.1:18789',
  token: '',
  sessionKey: '',
};

function loadConfig() {
  try { return { ...DEFAULT_CFG, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') }; }
  catch { return { ...DEFAULT_CFG }; }
}
function saveConfig(cfg) { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); }

let config = loadConfig();

// ============================================================
// DOM
// ============================================================
const messagesEl = document.getElementById('messages');
const welcomeEl = document.getElementById('welcome');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let isStreaming = false;
let currentController = null;

// ============================================================
// Auto-grow textarea
// ============================================================
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  sendBtn.disabled = !el.value.trim();
}

// ============================================================
// Key handler
// ============================================================
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ============================================================
// Quick actions
// ============================================================
function sendQuick(text) {
  inputEl.value = text;
  autoGrow(inputEl);
  sendMessage();
}

// ============================================================
// Append message to DOM
// ============================================================
function appendMsg(role, text) {
  if (welcomeEl) welcomeEl.style.display = 'none';

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🌅';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

// ============================================================
// Show thinking indicator
// ============================================================
function showThinking() {
  if (welcomeEl) welcomeEl.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'thinking-msg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🌅';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

// ============================================================
// Send message via OpenAI-compatible HTTP API
// ============================================================
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  // Show user message
  appendMsg('user', text);
  inputEl.value = '';
  autoGrow(inputEl);

  // Show thinking
  const thinkingBubble = showThinking();
  isStreaming = true;
  sendBtn.disabled = true;

  // Build messages array from DOM
  const messages = [];
  messagesEl.querySelectorAll('.msg').forEach(m => {
    const role = m.classList.contains('user') ? 'user' : 'assistant';
    const bubble = m.querySelector('.msg-bubble');
    if (bubble && !bubble.querySelector('.thinking')) {
      messages.push({ role, content: bubble.textContent });
    }
  });

  try {
    currentController = new AbortController();
    const url = `${config.endpoint}/v1/chat/completions`;

    const body = {
      model: 'openclaw',
      messages,
      stream: true,
    };

    const headers = { 'Content-Type': 'application/json' };
    if (config.token) headers['Authorization'] = `Bearer ${config.token}`;
    if (config.sessionKey) headers['x-openclaw-session-key'] = config.sessionKey;

    const resp = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
      signal: currentController.signal,
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err}`);
    }

    // Remove thinking indicator, start building real bubble
    const thinkingMsg = document.getElementById('thinking-msg');
    if (thinkingMsg) thinkingMsg.remove();

    const bubble = appendMsg('assistant', '');

    // Stream SSE
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const obj = JSON.parse(data);
          const delta = obj.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            bubble.textContent = fullText;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch {}
      }
    }

    if (!fullText) {
      // Fallback: try non-streaming
      const resp2 = await fetch(url, {
        method: 'POST',
        headers,
        body: JSON.stringify({ ...body, stream: false }),
      });
      if (resp2.ok) {
        const d = await resp2.json();
        const content = d.choices?.[0]?.message?.content || '(空回复)';
        bubble.textContent = content;
      }
    }

  } catch (err) {
    // Remove thinking
    const thinkingMsg = document.getElementById('thinking-msg');
    if (thinkingMsg) thinkingMsg.remove();

    if (err.name !== 'AbortError') {
      appendMsg('assistant', `⚠️ 连接失败：${err.message}\n\n请检查 设置 中的 Gateway 地址和 Token。`);
    }
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    currentController = null;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

// ============================================================
// Settings
// ============================================================
function toggleSettings() {
  const overlay = document.getElementById('settingsOverlay');
  const drawer = document.getElementById('settingsDrawer');
  const isOpen = drawer.classList.contains('open');
  if (isOpen) {
    overlay.classList.remove('open');
    drawer.classList.remove('open');
  } else {
    document.getElementById('cfgEndpoint').value = config.endpoint;
    document.getElementById('cfgToken').value = config.token;
    document.getElementById('cfgSession').value = config.sessionKey;
    overlay.classList.add('open');
    drawer.classList.add('open');
  }
}

function saveSettings() {
  config.endpoint = document.getElementById('cfgEndpoint').value.replace(/\/+$/, '');
  config.token = document.getElementById('cfgToken').value.trim();
  config.sessionKey = document.getElementById('cfgSession').value.trim();
  saveConfig(config);
  toggleSettings();
  // Test connection
  testConnection();
}

async function testConnection() {
  try {
    const headers = {};
    if (config.token) headers['Authorization'] = `Bearer ${config.token}`;
    const resp = await fetch(`${config.endpoint}/v1/models`, { headers });
    if (resp.ok) {
      const dot = document.querySelector('.status-dot');
      const txt = document.querySelector('.header-status');
      if (dot) dot.style.background = '#22c55e';
      if (txt) txt.childNodes[2].textContent = ' 已连接';
    }
  } catch {}
}

// ============================================================
// Init
// ============================================================
inputEl.focus();
</script>
</body>
</html>
