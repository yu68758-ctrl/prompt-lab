<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参考图反推工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:24px}

/* Upload */
.upload-zone{border:2px dashed #333;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:20px}
.upload-zone:hover,.upload-zone.dragover{border-color:#666;background:#1a1a1a}
.upload-zone p{color:#888;font-size:14px}
.upload-zone .icon{font-size:36px;margin-bottom:8px}
.preview-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.preview-item{position:relative;width:120px;height:90px;border-radius:8px;overflow:hidden;border:1px solid #333}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;line-height:20px;text-align:center}

/* Form */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;font-weight:500}
.field select,.field textarea{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:14px;font-family:inherit;resize:vertical}
.field textarea{min-height:80px}
.field select:focus,.field textarea:focus{outline:none;border-color:#555}

/* API Config */
.api-config{background:#1a1a1a;border-radius:10px;padding:16px;margin-bottom:20px}
.api-config summary{cursor:pointer;font-size:13px;color:#888;font-weight:500}
.api-config .fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.api-config input{width:100%;background:#0f0f0f;border:1px solid #333;border-radius:6px;padding:8px 10px;color:#e0e0e0;font-size:13px;font-family:monospace}
.api-config input:focus{outline:none;border-color:#555}
.api-config .hint{font-size:11px;color:#666;margin-top:4px}

/* Button */
.btn{background:#fff;color:#000;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-row{display:flex;gap:10px;align-items:center;margin-bottom:24px}
.btn-secondary{background:#2a2a2a;color:#ccc}

/* Loading */
.loading{display:none;text-align:center;padding:40px}
.loading.show{display:block}
.spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#888;font-size:13px}

/* Results */
.results{display:none}
.results.show{display:block}
.section{background:#1a1a1a;border-radius:10px;padding:16px;margin-bottom:12px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-title{font-size:14px;font-weight:600;color:#ccc}
.section-actions{display:flex;gap:6px}
.btn-sm{background:#2a2a2a;color:#aaa;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.btn-sm:hover{background:#333;color:#fff}
.section-content{font-size:13px;color:#bbb;line-height:1.7;white-space:pre-wrap;font-family:monospace;background:#0f0f0f;border-radius:8px;padding:12px;max-height:300px;overflow-y:auto}
.section-content.editable:focus{outline:1px solid #555}

/* JSON */
.json-block{position:relative}
.json-block pre{font-size:12px;color:#aaa;background:#0f0f0f;border-radius:8px;padding:12px;max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:8px;right:8px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<h1>🎨 参考图反推工具</h1>
<p class="subtitle">上传参考图 → 分析创意 → 生成结构化 Prompt</p>

<!-- API Config -->
<details class="api-config">
<summary>⚙️ API 配置</summary>
<div class="fields">
<div>
<label>API Base URL</label>
<input id="apiBase" value="https://token-plan-cn.xiaomimimo.com/v1" placeholder="https://api.example.com/v1">
</div>
<div>
<label>Model</label>
<input id="apiModel" value="xiaomi/mimo-v2.5-pro" placeholder="model-name">
</div>
<div style="grid-column:1/-1">
<label>API Key</label>
<input id="apiKey" type="password" placeholder="sk-...">
<p class="hint">Key 仅在浏览器本地使用，不会发送到第三方服务器</p>
</div>
</div>
</details>

<!-- Upload -->
<div class="upload-zone" id="uploadZone">
<div class="icon">📷</div>
<p>拖拽图片到这里，或点击上传（1~4张）</p>
<input type="file" id="fileInput" accept="image/*" multiple hidden>
</div>
<div class="preview-row" id="previewRow"></div>

<!-- Requirements -->
<div class="field">
<label>海报类型</label>
<select id="posterType">
<option value="atmosphere_screen">氛围感投屏</option>
<option value="weekly_broadcast">每周播报</option>
<option value="interactive_topic">互动话题</option>
<option value="other">其他</option>
</select>
</div>
<div class="field">
<label>尺寸需求</label>
<select id="sizeNeed">
<option value="both">横版 A4 + 16:9</option>
<option value="a4">仅横版 A4</option>
<option value="169">仅 16:9</option>
</select>
</div>
<div class="field">
<label>需求描述 / 文案 / 风格要求</label>
<textarea id="userGoal" placeholder="例如：夏日明信片氛围感海报，大标题+副标题，风格偏轻松可爱"></textarea>
</div>

<div class="btn-row">
<button class="btn" id="genBtn" disabled>✨ 生成分析</button>
<button class="btn btn-secondary" id="clearBtn">清空</button>
</div>

<!-- Loading -->
<div class="loading" id="loading">
<div class="spinner"></div>
<p>正在分析参考图，请稍候...</p>
</div>

<!-- Results -->
<div class="results" id="results">
<div class="section">
<div class="section-header">
<span class="section-title">📋 海报类型判断</span>
<div class="section-actions">
<button class="btn-sm" onclick="regen('type')">重新生成</button>
</div>
</div>
<div class="section-content" id="outType" tabindex="0"></div>
</div>

<div class="section">
<div class="section-header">
<span class="section-title">📊 文案容量分析</span>
<div class="section-actions">
<button class="btn-sm" onclick="regen('copy')">重新生成</button>
</div>
</div>
<div class="section-content" id="outCopy" tabindex="0"></div>
</div>

<div class="section">
<div class="section-header">
<span class="section-title">🎨 视觉分析</span>
<div class="section-actions">
<button class="btn-sm" onclick="regen('visual')">重新生成</button>
</div>
</div>
<div class="section-content" id="outVisual" tabindex="0"></div>
</div>

<div class="section">
<div class="section-header">
<span class="section-title">✨ 横版 A4 Prompt</span>
<div class="section-actions">
<button class="btn-sm" onclick="regen('a4')">重新生成</button>
<button class="btn-sm" onclick="copySection('a4')">复制</button>
</div>
</div>
<div class="section-content" id="outA4" tabindex="0"></div>
</div>

<div class="section">
<div class="section-header">
<span class="section-title">🖥️ 16:9 投屏 Prompt</span>
<div class="section-actions">
<button class="btn-sm" onclick="regen('169')">重新生成</button>
<button class="btn-sm" onclick="copySection('169')">复制</button>
</div>
</div>
<div class="section-content" id="out169" tabindex="0"></div>
</div>

<div class="section">
<div class="section-header">
<span class="section-title">🎭 风格 Prompt</span>
<div class="section-actions">
<button class="btn-sm" onclick="regen('style')">重新生成</button>
<button class="btn-sm" onclick="copySection('style')">复制</button>
</div>
</div>
<div class="section-content" id="outStyle" tabindex="0"></div>
</div>

<div class="section">
<div class="section-header">
<span class="section-title">🚫 负面 Prompt</span>
<div class="section-actions">
<button class="btn-sm" onclick="regen('neg')">重新生成</button>
<button class="btn-sm" onclick="copySection('neg')">复制</button>
</div>
</div>
<div class="section-content" id="outNeg" tabindex="0"></div>
</div>

<div class="section">
<div class="section-header">
<span class="section-title">📦 结构化 JSON</span>
<div class="section-actions">
<button class="btn-sm" onclick="copySection('json')">复制</button>
</div>
</div>
<div class="section-content json-block"><pre id="outJson"></pre></div>
</div>

<div class="btn-row" style="margin-top:16px">
<button class="btn" onclick="copyAll()">📋 复制全部 Prompt</button>
<button class="btn btn-secondary" onclick="exportJson()">💾 导出 JSON</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const uploadZone = $('#uploadZone');
const fileInput = $('#fileInput');
const previewRow = $('#previewRow');
const genBtn = $('#genBtn');
const loading = $('#loading');
const results = $('#results');
let uploadedFiles = [];

// Upload handling
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  const max = 4 - uploadedFiles.length;
  const toAdd = [...files].slice(0, max);
  toAdd.forEach(f => {
    if (!f.type.startsWith('image/')) return;
    uploadedFiles.push(f);
    const reader = new FileReader();
    reader.onload = e => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.innerHTML = `<img src="${e.target.result}"><button class="remove" onclick="removeImg(this,${uploadedFiles.length-1})">×</button>`;
      previewRow.appendChild(div);
    };
    reader.readAsDataURL(f);
  });
  genBtn.disabled = uploadedFiles.length === 0;
}

function removeImg(btn, idx) {
  uploadedFiles.splice(idx, 1);
  btn.parentElement.remove();
  genBtn.disabled = uploadedFiles.length === 0;
}

$('#clearBtn').addEventListener('click', () => {
  uploadedFiles = [];
  previewRow.innerHTML = '';
  results.classList.remove('show');
  genBtn.disabled = true;
  fileInput.value = '';
});

// API call
const SYSTEM_PROMPT = `你是一个面向海报生产流程的参考图反推与创意分析技能。

核心规则：
1. 不得改写用户文案，只能做容量和适配判断
2. 默认不在生图 prompt 中生成真实文字
3. 先判断海报类型，再反推 prompt
4. 必须输出双尺寸 prompt（横版 A4 + 16:9）
5. 提炼参考图创意逻辑，不是表面风格词
6. 输出中文说明 + 可用 prompt

输出格式要求（严格按以下结构，用 markdown 标题分隔）：

## 海报类型判断
（类型、信息密度、判断理由）

## 视觉分析
（构图、主视觉、色彩、材质、装饰元素、创意亮点）

## 文案容量判断
（文案量级、建议文字占比、承载能力、匹配结果）

## 生成策略
（推荐方式、文字处理方式）

## 横版 A4 Prompt
（纯英文 prompt，适配 297:210）

## 16:9 投屏 Prompt
（纯英文 prompt，适配 16:9）

## 风格 Prompt
（风格关键词）

## 负面 Prompt
（排除项）`;

async function callAPI(messages) {
  const base = $('#apiBase').value.trim();
  const key = $('#apiKey').value.trim();
  const model = $('#apiModel').value.trim();
  if (!base || !key) { toast('请先配置 API'); return null; }
  try {
    const res = await fetch(`${base}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ model, messages, max_tokens: 4096, temperature: 0.7 })
    });
    if (!res.ok) { const e = await res.text(); throw new Error(`API ${res.status}: ${e}`); }
    const data = await res.json();
    return data.choices[0].message.content;
  } catch (err) { toast('API 调用失败: ' + err.message); return null; }
}

function buildMessages(goalOverride, sectionHint) {
  const goal = goalOverride || $('#userGoal').value || '氛围感海报';
  const posterType = $('#posterType').value;
  const sizeNeed = $('#sizeNeed').value;
  const typeMap = { atmosphere_screen:'氛围感投屏', weekly_broadcast:'每周播报', interactive_topic:'互动话题', other:'其他' };
  const sizeMap = { both:'需要横版 A4 和 16:9 两个尺寸', a4:'仅需横版 A4', '169':'仅需 16:9' };

  let userText = `海报类型：${typeMap[posterType]}\n尺寸需求：${sizeMap[sizeNeed]}\n需求：${goal}`;
  if (sectionHint) userText += `\n\n请重点重新生成以下部分：${sectionHint}`;

  const content = [{ type: 'text', text: userText }];
  uploadedFiles.forEach(f => {
    content.push({ type: 'image_url', image_url: { url: URL.createObjectURL(f) } });
  });

  return [
    { role: 'system', content: SYSTEM_PROMPT },
    { role: 'user', content }
  ];
}

async function generate(goalOverride, sectionHint) {
  loading.classList.add('show');
  results.classList.remove('show');
  genBtn.disabled = true;

  const messages = buildMessages(goalOverride, sectionHint);
  const raw = await callAPI(messages);

  loading.classList.remove('show');
  genBtn.disabled = false;
  if (!raw) return;

  parseAndDisplay(raw);
  results.classList.add('show');
  toast('分析完成');
}

genBtn.addEventListener('click', () => generate());

function parseAndDisplay(raw) {
  const sections = {
    type: extractSection(raw, '海报类型判断', '视觉分析'),
    visual: extractSection(raw, '视觉分析', '文案容量判断'),
    copy: extractSection(raw, '文案容量判断', '生成策略'),
    a4: extractSection(raw, '横版 A4 Prompt', '16:9'),
    '169': extractSection(raw, '16:9', '风格 Prompt'),
    style: extractSection(raw, '风格 Prompt', '负面 Prompt'),
    neg: extractSection(raw, '负面 Prompt', null)
  };

  $('#outType').textContent = sections.type || '（未提取到）';
  $('#outVisual').textContent = sections.visual || '（未提取到）';
  $('#outCopy').textContent = sections.copy || '（未提取到）';
  $('#outA4').textContent = sections.a4 || '（未提取到）';
  $('#out169').textContent = sections['169'] || '（未提取到）';
  $('#outStyle').textContent = sections.style || '（未提取到）';
  $('#outNeg').textContent = sections.neg || '（未提取到）';
  $('#outJson').textContent = '（JSON 会在后续版本中结构化输出）';
}

function extractSection(text, start, end) {
  const re = new RegExp(`##\\s*${start}[\\s\\S]*?\\n([\\s\\S]*?)${end ? `(?=##\\s*${end})` : '$'}`, 'i');
  const m = text.match(re);
  return m ? m[1].trim() : '';
}

async function regen(section) {
  const hintMap = {
    type: '海报类型判断',
    copy: '文案容量分析',
    visual: '视觉分析',
    a4: '横版 A4 Prompt',
    '169': '16:9 投屏 Prompt',
    style: '风格 Prompt',
    neg: '负面 Prompt'
  };
  await generate(null, `只重新生成：${hintMap[section]}`);
}

function copySection(section) {
  const el = { a4: '#outA4', '169': '#out169', style: '#outStyle', neg: '#outNeg', json: '#outJson' }[section];
  const text = el ? document.querySelector(el).textContent : '';
  navigator.clipboard.writeText(text).then(() => toast('已复制'));
}

function copyAll() {
  const parts = [
    '=== 横版 A4 Prompt ===',
    $('#outA4').textContent,
    '',
    '=== 16:9 投屏 Prompt ===',
    $('#out169').textContent,
    '',
    '=== 风格 Prompt ===',
    $('#outStyle').textContent,
    '',
    '=== 负面 Prompt ===',
    $('#outNeg').textContent
  ].join('\n');
  navigator.clipboard.writeText(parts).then(() => toast('全部 Prompt 已复制'));
}

function exportJson() {
  const json = JSON.stringify({
    a4: $('#outA4').textContent,
    '169': $('#out169').textContent,
    style: $('#outStyle').textContent,
    negative: $('#outNeg').textContent,
    meta: { posterType: $('#posterType').value, goal: $('#userGoal').value }
  }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prompts.json';
  a.click();
  toast('JSON 已下载');
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
