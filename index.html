<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Lab - AI Poster Pipeline</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'pl-bg': '#0a0a12',
            'pl-surface': '#12121e',
            'pl-border': '#1e1e30',
            'pl-text': '#e2e2f0',
            'pl-muted': '#8888a0',
            'pl-accent-start': '#6366f1',
            'pl-accent-end': '#8b5cf6',
          },
          fontFamily: {
            sans: ['"Inter"', '"Noto Sans SC"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #0a0a12;
      color: #e2e2f0;
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a55; }

    .panel-overlay {
      transition: opacity 0.3s ease;
    }
    .panel-slide-right {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .panel-slide-left {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .workspace-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0a12;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    .step-active-pulse::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid currentColor;
      animation: pulse-ring 1.5s ease-out infinite;
    }

    .data-preview pre {
      background: #12121e;
      border: 1px solid #1e1e30;
      border-radius: 8px;
      padding: 16px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.6;
      color: #a5b4fc;
      max-height: 280px;
    }

    @media (max-width: 768px) {
      .desktop-sidebar { display: none !important; }
      .mobile-topbar { display: flex !important; }
    }
    @media (min-width: 769px) {
      .mobile-topbar { display: none !important; }
    }
  </style>
  <script src="shared/config.js"></script>
  <script src="shared/store.js"></script>
  <script src="shared/api.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    const STEPS = [
      { num: 1, name: '参考图反推', icon: '🔍', desc: '上传参考图，分析风格与创意', color: '#818cf8' },
      { num: 2, name: '文案拆解', icon: '✍️', desc: '拆解标题、正文、CTA', color: '#34d399' },
      { num: 3, name: 'Prompt 构建', icon: '🧩', desc: '生成生图 Prompt 组合', color: '#60a5fa' },
      { num: 4, name: '生图执行', icon: '🎨', desc: '调用 API 生成海报底图', color: '#f472b6' },
      { num: 5, name: '排版合成', icon: '📐', desc: '文字渲染 + 最终导出', color: '#fbbf24' },
    ];

    /* ─── Sidebar Step Item ─── */
    function StepItem({ step, active, completed, onClick }) {
      return (
        <button
          onClick={() => onClick(step.num)}
          className={`
            relative flex items-center gap-3 w-full px-3 py-3 rounded-xl text-left
            transition-all duration-200 group cursor-pointer
            ${active
              ? 'bg-white/5 shadow-lg shadow-purple-500/5'
              : 'hover:bg-white/[0.03]'
            }
          `}
        >
          <div className="relative flex-shrink-0">
            <div
              className={`
                w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold
                transition-all duration-200
                ${completed
                  ? 'bg-gradient-to-br from-indigo-500 to-purple-500 text-white shadow-lg shadow-purple-500/30'
                  : active
                    ? 'border-2 text-white'
                    : 'border border-pl-border text-pl-muted group-hover:border-gray-600'
                }
              `}
              style={active ? { borderColor: step.color, color: step.color } : {}}
            >
              {completed ? '✓' : step.icon}
            </div>
            {active && (
              <div
                className="absolute -inset-1 rounded-full opacity-20 blur-sm"
                style={{ background: step.color }}
              />
            )}
          </div>

          <div className="min-w-0">
            <div className={`text-sm font-medium truncate ${active ? 'text-white' : 'text-pl-muted group-hover:text-pl-text'}`}>
              <span className="text-xs mr-1.5 opacity-50">{step.num}.</span>
              {step.name}
            </div>
            <div className={`text-xs truncate mt-0.5 ${active ? 'opacity-60' : 'opacity-0 group-hover:opacity-40'} transition-opacity`}>
              {step.desc}
            </div>
          </div>

          {active && (
            <div
              className="absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-6 rounded-full"
              style={{ background: step.color }}
            />
          )}
        </button>
      );
    }

    /* ─── Settings Panel ─── */
    const SETTINGS_KEY = 'poster_pipeline_config_v2';
    const DEFAULT_SETTINGS = {
      apis: {
        analysis: { name: '分析模型', endpoint: 'https://xinyuanai666.com/v1/chat/completions', model: 'gpt-4o', apiKey: '' },
        imageGen: { name: '生图模型', endpoint: 'https://xinyuanai666.com/v1/images/generations', model: 'gpt-image-2', apiKey: '' },
        imageEdit: { name: '图生图模型', endpoint: 'https://xinyuanai666.com/v1/images/edits', model: 'gpt-image-2', apiKey: '' },
      }
    };
    function loadSettings() {
      try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}') }; }
      catch { return JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); }
    }
    function saveSettings(cfg) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(cfg)); }

    function SettingsPanel({ open, onClose }) {
      const [config, setConfig] = useState(() => loadSettings());

      useEffect(() => { if (open) setConfig(loadSettings()); }, [open]);

      const handleChange = (section, field, value) => {
        setConfig(prev => ({
          ...prev,
          apis: { ...prev.apis, [section]: { ...prev.apis[section], [field]: value } },
        }));
      };

      const handleSave = () => { saveSettings(config); onClose(); };
      const handleReset = () => { const def = JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); setConfig(def); saveSettings(def); };

      const sections = [
        { key: 'analysis', label: '分析模型', icon: '🧠' },
        { key: 'imageGen', label: '生图模型', icon: '🎨' },
        { key: 'imageEdit', label: '图生图模型', icon: '🖼️' },
      ];
      const fields = [
        { key: 'name', label: '名称', placeholder: '模型显示名称' },
        { key: 'endpoint', label: 'Endpoint', placeholder: 'API 地址' },
        { key: 'model', label: 'Model', placeholder: '模型标识' },
        { key: 'apiKey', label: 'API Key', placeholder: '密钥', type: 'password' },
      ];

      return (
        <>
          {open && (
            <div
              className="panel-overlay fixed inset-0 bg-black/50 backdrop-blur-sm z-40"
              onClick={onClose}
            />
          )}
          <div
            className={`
              panel-slide-right fixed top-0 right-0 h-full w-full max-w-md z-50
              bg-pl-surface border-l border-pl-border shadow-2xl
              flex flex-col
              ${open ? 'translate-x-0' : 'translate-x-full'}
            `}
          >
            <div className="flex items-center justify-between px-6 py-4 border-b border-pl-border">
              <h2 className="text-lg font-semibold">⚙️ 设置</h2>
              <button
                onClick={onClose}
                className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white/5 transition-colors text-pl-muted hover:text-white"
              >
                ✕
              </button>
            </div>

            <div className="flex-1 overflow-y-auto px-6 py-5 space-y-6">
              {config && sections.map(sec => (
                <div key={sec.key} className="space-y-3">
                  <h3 className="text-sm font-semibold text-pl-muted uppercase tracking-wider flex items-center gap-2">
                    <span>{sec.icon}</span>
                    {sec.label}
                  </h3>
                  <div className="space-y-2.5">
                    {fields.map(f => (
                      <div key={f.key}>
                        <label className="text-xs text-pl-muted mb-1 block">{f.label}</label>
                        <input
                          type={f.type || 'text'}
                          value={config.apis?.[sec.key]?.[f.key] || ''}
                          onChange={e => handleChange(sec.key, f.key, e.target.value)}
                          placeholder={f.placeholder}
                          className="
                            w-full px-3 py-2 bg-pl-bg border border-pl-border rounded-lg
                            text-sm text-pl-text placeholder-pl-muted/40
                            focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/20
                            transition-colors
                          "
                        />
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div className="px-6 py-4 border-t border-pl-border flex gap-3">
              <button
                onClick={handleReset}
                className="
                  flex-1 px-4 py-2.5 rounded-lg border border-pl-border text-sm font-medium
                  text-pl-muted hover:text-white hover:border-gray-600 transition-colors
                "
              >
                恢复默认
              </button>
              <button
                onClick={handleSave}
                className="
                  flex-1 px-4 py-2.5 rounded-lg text-sm font-semibold text-white
                  bg-gradient-to-r from-indigo-500 to-purple-500
                  hover:from-indigo-400 hover:to-purple-400
                  shadow-lg shadow-purple-500/20 transition-all
                "
              >
                保存设置
              </button>
            </div>
          </div>
        </>
      );
    }

    /* ─── History Panel ─── */
    function HistoryPanel({ open, onClose, onLoad }) {
      const [history, setHistory] = useState([]);

      useEffect(() => {
        if (open && window.PipelineStore) {
          setHistory(window.PipelineStore.getHistory() || []);
        }
      }, [open]);

      const handleSaveCurrent = () => {
        if (window.PipelineStore) {
          window.PipelineStore.saveToHistory();
          setHistory(window.PipelineStore.getHistory() || []);
        }
      };

      const handleLoad = (item) => {
        if (window.PipelineStore) {
          window.PipelineStore.loadFromHistory(item.id);
        }
        onLoad();
        onClose();
      };

      const handleDelete = (id, e) => {
        e.stopPropagation();
        if (window.PipelineStore) {
          window.PipelineStore.deleteHistory(id);
          setHistory(window.PipelineStore.getHistory() || []);
        }
      };

      const formatTime = (ts) => {
        try {
          const d = new Date(ts);
          return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        } catch { return ts; }
      };

      return (
        <>
          {open && (
            <div
              className="panel-overlay fixed inset-0 bg-black/50 backdrop-blur-sm z-40"
              onClick={onClose}
            />
          )}
          <div
            className={`
              panel-slide-left fixed top-0 left-0 h-full w-full max-w-sm z-50
              bg-pl-surface border-r border-pl-border shadow-2xl
              flex flex-col
              ${open ? 'translate-x-0' : '-translate-x-full'}
            `}
          >
            <div className="flex items-center justify-between px-6 py-4 border-b border-pl-border">
              <h2 className="text-lg font-semibold">📋 历史记录</h2>
              <button
                onClick={onClose}
                className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white/5 transition-colors text-pl-muted hover:text-white"
              >
                ✕
              </button>
            </div>

            <div className="px-6 py-3 border-b border-pl-border">
              <button
                onClick={handleSaveCurrent}
                className="
                  w-full px-4 py-2.5 rounded-lg text-sm font-medium
                  bg-white/5 hover:bg-white/10 border border-pl-border
                  text-pl-text transition-colors flex items-center justify-center gap-2
                "
              >
                <span>💾</span> 保存当前项目
              </button>
            </div>

            <div className="flex-1 overflow-y-auto px-4 py-3 space-y-2">
              {history.length === 0 && (
                <div className="text-center text-pl-muted text-sm py-12">
                  暂无历史记录
                </div>
              )}
              {history.map((item, i) => (
                <div
                  key={item.id || i}
                  onClick={() => handleLoad(item)}
                  className="
                    px-4 py-3 rounded-xl bg-pl-bg border border-pl-border
                    hover:border-indigo-500/30 hover:bg-white/[0.02]
                    cursor-pointer transition-all group
                  "
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs text-pl-muted">{formatTime(item.savedAt)}</span>
                    <button
                      onClick={(e) => handleDelete(item.id, e)}
                      className="
                        opacity-0 group-hover:opacity-100 text-xs text-red-400/60 hover:text-red-400
                        transition-opacity px-1.5 py-0.5 rounded
                      "
                    >
                      删除
                    </button>
                  </div>
                  <div className="text-sm text-pl-text truncate">
                    {item.title || item.preview || '未命名项目'}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </>
      );
    }

    /* ─── Data Preview ─── */
    function DataPreview({ visible }) {
      const [data, setData] = useState(null);

      useEffect(() => {
        if (visible && window.PipelineStore) {
          setData(window.PipelineStore.getProject());
        }
      }, [visible]);

      if (!visible) return null;

      return (
        <div className="data-preview border-t border-pl-border bg-pl-surface/80 backdrop-blur-sm px-6 py-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-semibold text-pl-muted uppercase tracking-wider">📦 项目数据预览</span>
            <span className="text-xs text-pl-muted/50">PipelineStore.getProject()</span>
          </div>
          <pre>{JSON.stringify(data, null, 2) || '{\n  // 暂无数据\n}'}</pre>
        </div>
      );
    }

    /* ─── Mobile Top Bar ─── */
    function MobileTopBar({ steps, currentStep, completedSteps, onStepClick }) {
      return (
        <div className="mobile-topbar items-center gap-1 px-2 py-2 bg-pl-surface border-b border-pl-border overflow-x-auto">
          {steps.map(step => {
            const active = currentStep === step.num;
            const done = completedSteps[step.num - 1];
            return (
              <button
                key={step.num}
                onClick={() => onStepClick(step.num)}
                className={`
                  flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center text-sm
                  transition-all duration-200
                  ${done
                    ? 'bg-gradient-to-br from-indigo-500 to-purple-500 text-white'
                    : active
                      ? 'border-2 bg-white/5'
                      : 'border border-pl-border text-pl-muted'
                  }
                `}
                style={active ? { borderColor: step.color, color: step.color } : {}}
                title={step.name}
              >
                {done ? '✓' : step.icon}
              </button>
            );
          })}
        </div>
      );
    }

    /* ─── Main App ─── */
    function App() {
      const [currentStep, setCurrentStep] = useState(1);
      const [showSettings, setShowSettings] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [showDataPreview, setShowDataPreview] = useState(false);
      const [stepStatus, setStepStatus] = useState([false, false, false, false, false]);
      const iframeRef = useRef(null);

      useEffect(() => {
        if (window.PipelineStore) {
          const project = window.PipelineStore.getProject();
          if (project && project.steps) {
            setStepStatus(project.steps.map(s => s.completed));
          }
        }
      }, []);

      useEffect(() => {
        const handler = (event) => {
          const msg = event.data;
          if (msg && msg.type === 'skill-complete' && msg.skill >= 1 && msg.skill <= 5) {
            setStepStatus(prev => {
              const next = [...prev];
              next[msg.skill - 1] = true;
              return next;
            });
            if (msg.data && window.PipelineStore) {
              window.PipelineStore.saveSkillOutput(msg.skill, msg.data);
            }
          }
          if (msg && msg.type === 'open-settings') {
            setShowSettings(true);
          }
        };
        window.addEventListener('message', handler);
        return () => window.removeEventListener('message', handler);
      }, []);

      const handleStepClick = useCallback((num) => {
        setCurrentStep(num);
      }, []);

      const handlePrev = useCallback(() => {
        setCurrentStep(prev => Math.max(1, prev - 1));
      }, []);

      const handleNext = useCallback(() => {
        setCurrentStep(prev => Math.min(5, prev + 1));
      }, []);

      const handleHistoryLoad = useCallback(() => {
        if (window.PipelineStore) {
          const project = window.PipelineStore.getProject();
          if (project && project.stepStatus) {
            setStepStatus(project.stepStatus);
          }
        }
      }, []);

      const activeStep = STEPS[currentStep - 1];

      return (
        <div className="flex h-screen bg-pl-bg">
          {/* ── Desktop Sidebar ── */}
          <aside className="desktop-sidebar flex-shrink-0 w-64 bg-pl-surface border-r border-pl-border flex flex-col">
            <div className="px-5 py-5 border-b border-pl-border">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white text-lg font-bold shadow-lg shadow-purple-500/20">
                  P
                </div>
                <div>
                  <div className="text-sm font-bold tracking-tight">Prompt Lab</div>
                  <div className="text-[10px] text-pl-muted">AI Poster Pipeline</div>
                </div>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto px-3 py-4 space-y-1">
              <div className="px-3 mb-3">
                <span className="text-[10px] font-semibold text-pl-muted/60 uppercase tracking-widest">工作流</span>
              </div>
              {STEPS.map(step => (
                <StepItem
                  key={step.num}
                  step={step}
                  active={currentStep === step.num}
                  completed={stepStatus[step.num - 1]}
                  onClick={handleStepClick}
                />
              ))}
            </nav>

            <div className="px-4 py-3 border-t border-pl-border text-[10px] text-pl-muted/40 text-center">
              v1.0 — Powered by AI
            </div>
          </aside>

          {/* ── Mobile Top Bar ── */}
          <MobileTopBar
            steps={STEPS}
            currentStep={currentStep}
            completedSteps={stepStatus}
            onStepClick={handleStepClick}
          />

          {/* ── Main Content Area ── */}
          <main className="flex-1 flex flex-col min-w-0">
            {/* Top Bar */}
            <header className="flex items-center justify-between px-6 py-3 bg-pl-surface/50 backdrop-blur-sm border-b border-pl-border flex-shrink-0">
              <div className="flex items-center gap-3 min-w-0">
                <div
                  className="w-7 h-7 rounded-lg flex items-center justify-center text-sm flex-shrink-0"
                  style={{ background: activeStep.color + '20', color: activeStep.color }}
                >
                  {activeStep.icon}
                </div>
                <div className="min-w-0">
                  <h1 className="text-sm font-semibold truncate">
                    {activeStep.name}
                  </h1>
                  <p className="text-xs text-pl-muted truncate">{activeStep.desc}</p>
                </div>
              </div>

              <div className="flex items-center gap-2 flex-shrink-0">
                <button
                  onClick={() => setShowHistory(true)}
                  className="
                    px-3 py-1.5 rounded-lg text-xs font-medium text-pl-muted
                    hover:text-white hover:bg-white/5 border border-pl-border
                    transition-colors flex items-center gap-1.5
                  "
                >
                  <span>📋</span>
                  <span className="hidden sm:inline">历史</span>
                </button>
                <button
                  onClick={() => setShowSettings(true)}
                  className="
                    px-3 py-1.5 rounded-lg text-xs font-medium text-pl-muted
                    hover:text-white hover:bg-white/5 border border-pl-border
                    transition-colors flex items-center gap-1.5
                  "
                >
                  <span>⚙️</span>
                  <span className="hidden sm:inline">设置</span>
                </button>
              </div>
            </header>

            {/* Iframe Workspace */}
            <div className="flex-1 relative min-h-0">
              <iframe
                ref={iframeRef}
                src={`skills/skill-${String(currentStep).padStart(2, '0')}/index.html`}
                className="workspace-iframe"
                frameBorder="0"
                title={`Skill ${currentStep}: ${activeStep.name}`}
                allow="clipboard-write"
              />
            </div>

            {/* Bottom Bar */}
            <footer className="flex items-center justify-between px-6 py-3 bg-pl-surface/50 backdrop-blur-sm border-t border-pl-border flex-shrink-0">
              <button
                onClick={handlePrev}
                disabled={currentStep === 1}
                className={`
                  px-4 py-2 rounded-lg text-sm font-medium transition-all
                  ${currentStep === 1
                    ? 'text-pl-muted/30 cursor-not-allowed'
                    : 'text-pl-text hover:bg-white/5 border border-pl-border'
                  }
                `}
              >
                ← 上一步
              </button>

              <div className="flex items-center gap-3">
                <div className="flex items-center gap-1.5">
                  {STEPS.map(step => (
                    <button
                      key={step.num}
                      onClick={() => handleStepClick(step.num)}
                      className={`
                        w-2 h-2 rounded-full transition-all duration-200
                        ${stepStatus[step.num - 1]
                          ? 'bg-green-400'
                          : currentStep === step.num
                            ? 'bg-indigo-400 scale-125'
                            : 'bg-pl-border hover:bg-pl-muted'
                        }
                      `}
                    />
                  ))}
                </div>

                <button
                  onClick={() => setShowDataPreview(prev => !prev)}
                  className={`
                    px-3 py-1.5 rounded-lg text-xs font-medium transition-colors
                    border flex items-center gap-1.5
                    ${showDataPreview
                      ? 'border-indigo-500/30 text-indigo-300 bg-indigo-500/10'
                      : 'border-pl-border text-pl-muted hover:text-white hover:bg-white/5'
                    }
                  `}
                >
                  <span>{showDataPreview ? '▾' : '▸'}</span>
                  数据
                </button>
              </div>

              <button
                onClick={handleNext}
                disabled={currentStep === 5}
                className={`
                  px-4 py-2 rounded-lg text-sm font-semibold transition-all
                  ${currentStep === 5
                    ? 'text-pl-muted/30 cursor-not-allowed'
                    : 'text-white bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-400 hover:to-purple-400 shadow-lg shadow-purple-500/20'
                  }
                `}
              >
                下一步 →
              </button>
            </footer>

            {/* Data Preview Panel */}
            <DataPreview visible={showDataPreview} />
          </main>

          {/* ── Slide-out Panels ── */}
          <SettingsPanel open={showSettings} onClose={() => setShowSettings(false)} />
          <HistoryPanel open={showHistory} onClose={() => setShowHistory(false)} onLoad={handleHistoryLoad} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
