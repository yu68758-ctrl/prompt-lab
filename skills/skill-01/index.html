<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参考图反推 — Skill 01</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<script src="../../shared/config.js"></script>
<script src="../../shared/store.js"></script>
<script src="../../shared/api.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:#0a0a12; color:#e0e0e8; overflow-x:hidden;
  }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }

  /* Upload zone dark theme */
  .upload-zone-dark {
    border:2px dashed rgba(255,255,255,.12);
    background:rgba(255,255,255,.03);
    border-radius:14px; padding:32px; text-align:center;
    cursor:pointer; transition:all .25s;
  }
  .upload-zone-dark:hover, .upload-zone-dark.dragover {
    border-color:#6366f1; background:rgba(99,102,241,.06);
  }
  .upload-zone-dark.has-images {
    border-style:solid; border-color:rgba(99,102,241,.3);
    background:rgba(99,102,241,.04);
  }

  /* Thumb grid */
  .thumb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:10px; }
  .thumb-item {
    position:relative; aspect-ratio:1; border-radius:10px; overflow:hidden;
    border:2px solid rgba(255,255,255,.08); background:#111;
  }
  .thumb-item img { width:100%; height:100%; object-fit:cover; }
  .thumb-remove {
    position:absolute; top:4px; right:4px; width:22px; height:22px;
    background:rgba(239,68,68,.9); color:#fff; border:none; border-radius:50%;
    font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .2s;
  }
  .thumb-item:hover .thumb-remove { opacity:1; }

  /* Dark card */
  .dark-card {
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
    border-radius:14px; padding:20px;
  }

  /* Section panel */
  .section-panel {
    background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
    border-radius:12px; padding:16px 18px; transition:all .2s;
  }
  .section-panel:hover { border-color:rgba(255,255,255,.1); }

  /* Editable content */
  .editable-content {
    background:transparent; border:1px solid transparent; border-radius:8px;
    padding:8px 10px; color:#d0d0d8; font-size:13px; line-height:1.7;
    white-space:pre-wrap; word-break:break-word; min-height:40px;
    transition:border-color .2s; width:100%; resize:vertical;
    font-family:inherit; outline:none;
  }
  .editable-content:focus {
    border-color:rgba(99,102,241,.3); background:rgba(99,102,241,.04);
  }
  .editable-content:hover { border-color:rgba(255,255,255,.08); }

  /* JSON block */
  .json-block {
    background:#0d0d18; border:1px solid rgba(255,255,255,.06);
    border-radius:10px; padding:14px 16px;
    font-family:'SF Mono','Menlo','Consolas',monospace;
    font-size:12px; line-height:1.6; color:#a5b4fc;
    overflow-x:auto; white-space:pre-wrap; max-height:400px; overflow-y:auto;
  }

  /* Full-page loader overlay */
  .loader-overlay {
    position:fixed; inset:0; background:rgba(10,10,18,.88); z-index:9998;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }

  /* Per-section loader */
  .section-loader {
    display:flex; align-items:center; gap:8px; padding:12px 0;
    color:#888; font-size:13px;
  }

  /* Toast top-right */
  .toast-tr {
    position:fixed; top:20px; right:20px; z-index:10000;
    padding:12px 20px; border-radius:10px; color:#fff;
    font-weight:500; font-size:14px; box-shadow:0 4px 16px rgba(0,0,0,.3);
    animation:slideInTr .3s ease; max-width:360px; pointer-events:none;
    opacity:0; transition:opacity .3s;
  }
  .toast-tr.show { opacity:1; }
  .toast-tr.success { background:#22c55e; }
  .toast-tr.error { background:#ef4444; }
  .toast-tr.info { background:#6366f1; }
  @keyframes slideInTr {
    from { transform:translateX(40px); opacity:0; }
    to { transform:translateX(0); opacity:1; }
  }

  /* Gradient button */
  .btn-gradient {
    background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff;
    border:none; border-radius:10px; padding:10px 24px; font-size:14px;
    font-weight:600; cursor:pointer; transition:all .2s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn-gradient:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(99,102,241,.35); }
  .btn-gradient:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

  .btn-ghost {
    background:rgba(255,255,255,.06); color:#aaa; border:1px solid rgba(255,255,255,.1);
    border-radius:8px; padding:7px 14px; font-size:13px; cursor:pointer;
    transition:all .2s; display:inline-flex; align-items:center; gap:5px;
  }
  .btn-ghost:hover { background:rgba(255,255,255,.1); color:#ddd; }
  .btn-ghost:disabled { opacity:.4; cursor:not-allowed; }

  .btn-sm { padding:5px 12px; font-size:12px; border-radius:7px; }

  /* Dark input / select / textarea */
  .input-dark {
    width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
    border-radius:8px; padding:9px 12px; color:#e0e0e8; font-size:13px;
    font-family:inherit; outline:none; transition:border-color .2s;
  }
  .input-dark:focus { border-color:#6366f1; }
  .input-dark::placeholder { color:#555; }
  select.input-dark { appearance:none; cursor:pointer; }
  textarea.input-dark { resize:vertical; min-height:80px; line-height:1.6; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ================================================================
   Constants
   ================================================================ */

const POSTER_TYPES = [
  '氛围感投屏', '每周播报', '互动话题', '促销', '活动', '日常', '其他'
];

const SIZE_OPTIONS = [
  '横版A4+16:9', '仅横版A4', '仅16:9', '竖版A4', '自定义'
];

const SYSTEM_PROMPT = `你是一个面向海报生产流程的参考图反推与创意分析技能。

核心规则：
1. 不得改写用户文案，只能做容量和适配判断
2. 默认不在生图 prompt 中生成真实文字
3. 先判断海报类型，再反推 prompt
4. 必须输出双尺寸 prompt（横版 A4 + 16:9）
5. 提炼参考图创意逻辑，不是表面风格词
6. 输出中文说明 + 可用 prompt

输出格式要求（严格按以下结构，用 markdown 标题分隔）：

## 海报类型判断
（类型、信息密度、判断理由）

## 视觉分析
（构图、主视觉、色彩、材质、装饰元素、创意亮点）

## 文字视觉解析
（标题字体风格、颜色特效、排版位置、文字与主视觉关系）

## 文案容量判断
（文案量级、建议文字占比、承载能力）

## 生成策略
（推荐方式、文字处理方式）

## 横版 A4 Prompt
（纯英文 prompt，适配 297:210）

## 16:9 投屏 Prompt
（纯英文 prompt，适配 16:9）

## 风格 Prompt
（风格关键词）

## 负面 Prompt
（排除项）

## 结构化数据
以 JSON 格式输出以下字段（用 \`\`\`json 代码块包裹）：
{
  "posterType": "判断的海报类型",
  "dimensions": {"width": 297, "height": 210, "unit": "mm"},
  "styleKeywords": ["关键词1", "关键词2"],
  "colorPalette": ["#hex1", "#hex2", "#hex3"],
  "visualElements": ["元素1", "元素2"],
  "titleStyle": {"font": "bold", "color": "white", "effect": "glow"},
  "copyCapacity": {"maxChars": 50, "level": "少量文案"},
  "confidence": 0.85
}`;

const SECTION_DEFS = [
  { key: 'posterType',      icon: '📋', title: '海报类型判断',    heading: '## 海报类型判断' },
  { key: 'visual',          icon: '🎨', title: '视觉分析',        heading: '## 视觉分析' },
  { key: 'textVisual',      icon: '🔤', title: '文字视觉解析',    heading: '## 文字视觉解析' },
  { key: 'copyCapacity',    icon: '📊', title: '文案容量判断',    heading: '## 文案容量判断' },
  { key: 'strategy',        icon: '🚀', title: '生成策略',        heading: '## 生成策略' },
  { key: 'promptA4',        icon: '✨', title: '横版 A4 Prompt',  heading: '## 横版 A4 Prompt' },
  { key: 'prompt169',       icon: '🖥️', title: '16:9 投屏 Prompt', heading: '## 16:9 投屏 Prompt' },
  { key: 'stylePrompt',     icon: '🎭', title: '风格 Prompt',     heading: '## 风格 Prompt' },
  { key: 'negativePrompt',  icon: '🚫', title: '负面 Prompt',     heading: '## 负面 Prompt' },
  { key: 'json',            icon: '📦', title: '结构化 JSON',     heading: '## 结构化数据' },
];

const SECTION_REGEN_PROMPTS = {
  posterType:     '请只输出"海报类型判断"部分：判断海报类型、信息密度、判断理由。',
  visual:         '请只输出"视觉分析"部分：构图、主视觉、色彩、材质、装饰元素、创意亮点。',
  textVisual:     '请只输出"文字视觉解析"部分：标题字体风格、颜色特效、排版位置、文字与主视觉关系。',
  copyCapacity:   '请只输出"文案容量判断"部分：文案量级、建议文字占比、承载能力。',
  strategy:       '请只输出"生成策略"部分：推荐方式、文字处理方式。',
  promptA4:       '请只输出"横版 A4 Prompt"部分：纯英文 prompt，适配 297:210。',
  prompt169:      '请只输出"16:9 投屏 Prompt"部分：纯英文 prompt，适配 16:9。',
  stylePrompt:    '请只输出"风格 Prompt"部分：风格关键词。',
  negativePrompt: '请只输出"负面 Prompt"部分：排除项。',
  json:           '请只输出"结构化数据"部分：用 ```json 代码块包裹完整的 JSON 对象。',
};

/* ================================================================
   Helpers
   ================================================================ */

function isStandalone() {
  try { return window.self === window.top; } catch { return true; }
}

function parseSections(markdown) {
  const result = {};
  if (!markdown) return result;
  const headingRegex = /^## (.+)$/gm;
  const matches = [];
  let m;
  while ((m = headingRegex.exec(markdown)) !== null) {
    matches.push({ title: m[1].trim(), index: m.index + m[0].length });
  }
  for (let i = 0; i < matches.length; i++) {
    const start = matches[i].index;
    const nextHeadingPos = markdown.indexOf('\n## ', start);
    const end = (i + 1 < matches.length && nextHeadingPos !== -1) ? nextHeadingPos : markdown.length;
    const content = markdown.slice(start, end).trim();
    const title = matches[i].title;
    const def = SECTION_DEFS.find(d =>
      title.includes(d.title) ||
      d.heading.includes(title) ||
      title.includes(d.heading.replace('## ', ''))
    );
    if (def) {
      result[def.key] = content;
    }
  }
  return result;
}

function extractJson(text) {
  if (!text) return null;
  const match = text.match(/```json\s*([\s\S]*?)```/);
  if (match) {
    try { return JSON.parse(match[1].trim()); } catch {}
  }
  try { return JSON.parse(text.trim()); } catch {}
  return null;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ================================================================
   Toast Component
   ================================================================ */

function Toast({ message, type, visible }) {
  return (
    <div className={`toast-tr ${type} ${visible ? 'show' : ''}`}>
      {message}
    </div>
  );
}

/* ================================================================
   Upload Zone Component
   ================================================================ */

function UploadZone({ images, onAdd, onRemove }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleFiles = useCallback((files) => {
    const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (images.length + valid.length > 4) {
      if (window.PipelineAPI) PipelineAPI.toast('最多上传 4 张参考图', 'error');
      return;
    }
    onAdd(valid);
  }, [images.length, onAdd]);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    handleFiles(e.dataTransfer.files);
  }, [handleFiles]);

  const handleClick = () => inputRef.current?.click();

  return (
    <div className="dark-card">
      <div style={{fontSize:'13px', fontWeight:'600', marginBottom:'12px', color:'#aaa'}}>
        📷 参考图上传 <span style={{color:'#555', fontWeight:'400'}}>({images.length}/4)</span>
      </div>
      <div
        className={`upload-zone-dark ${dragOver ? 'dragover' : ''} ${images.length ? 'has-images' : ''}`}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
        onClick={handleClick}
      >
        {images.length === 0 ? (
          <div>
            <div style={{fontSize:'36px', marginBottom:'10px'}}>📁</div>
            <div style={{color:'#888', fontSize:'14px', marginBottom:'4px'}}>
              拖拽图片到此处，或点击上传
            </div>
            <div style={{color:'#555', fontSize:'12px'}}>支持 JPG / PNG / WebP，最多 4 张</div>
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
            <div className="thumb-grid">
              {images.map((img, i) => (
                <div key={i} className="thumb-item" onClick={(e) => e.stopPropagation()}>
                  <img src={img.preview} alt={`ref-${i}`} />
                  <button
                    className="thumb-remove"
                    onClick={(e) => { e.stopPropagation(); onRemove(i); }}
                  >
                    &times;
                  </button>
                </div>
              ))}
              {images.length < 4 && (
                <div
                  style={{
                    aspectRatio:'1', border:'2px dashed rgba(255,255,255,.1)', borderRadius:'10px',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    cursor:'pointer', color:'#555', fontSize:'28px', transition:'all .2s',
                  }}
                  onClick={(e) => { e.stopPropagation(); handleClick(); }}
                >
                  +
                </div>
              )}
            </div>
          </div>
        )}
      </div>
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        multiple
        style={{display:'none'}}
        onChange={(e) => { handleFiles(e.target.files); e.target.value = ''; }}
      />
    </div>
  );
}

/* ================================================================
   Config Form Component
   ================================================================ */

function ConfigForm({ posterType, setPosterType, size, setSize, description, setDescription }) {
  return (
    <div className="dark-card">
      <div style={{fontSize:'13px', fontWeight:'600', marginBottom:'16px', color:'#aaa'}}>
        ⚙️ 分析配置
      </div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px', marginBottom:'14px'}}>
        <div>
          <label style={{display:'block', fontSize:'12px', color:'#777', marginBottom:'5px', fontWeight:'500'}}>
            海报类型
          </label>
          <select
            className="input-dark"
            value={posterType}
            onChange={(e) => setPosterType(e.target.value)}
          >
            <option value="">自动判断</option>
            {POSTER_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div>
          <label style={{display:'block', fontSize:'12px', color:'#777', marginBottom:'5px', fontWeight:'500'}}>
            尺寸需求
          </label>
          <select
            className="input-dark"
            value={size}
            onChange={(e) => setSize(e.target.value)}
          >
            <option value="">默认（双尺寸）</option>
            {SIZE_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      </div>
      <div>
        <label style={{display:'block', fontSize:'12px', color:'#777', marginBottom:'5px', fontWeight:'500'}}>
          需求描述
        </label>
        <textarea
          className="input-dark"
          value={description}
          onChange={(e) => setDescription(e.target.value)}
          placeholder="输入文案内容、风格要求、特殊需求等..."
          rows={4}
        />
      </div>
    </div>
  );
}

/* ================================================================
   Section Panel Component
   ================================================================ */

function SectionPanel({ section, content, loading, onContentChange, onRegenerate, onCopy }) {
  const isJson = section.key === 'json';

  return (
    <div className="section-panel">
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        marginBottom:'10px',
      }}>
        <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
          <span style={{fontSize:'16px'}}>{section.icon}</span>
          <span style={{fontSize:'14px', fontWeight:'600', color:'#d0d0d8'}}>{section.title}</span>
        </div>
        <div style={{display:'flex', gap:'6px'}}>
          <button
            className="btn-ghost btn-sm"
            onClick={() => onRegenerate(section.key)}
            disabled={loading}
          >
            {loading ? '生成中...' : '重新生成'}
          </button>
          <button className="btn-ghost btn-sm" onClick={() => onCopy(section.key)}>
            复制
          </button>
        </div>
      </div>
      {loading ? (
        <div className="section-loader">
          <div className="pulse-loader"><span></span><span></span><span></span></div>
          <span>正在重新生成...</span>
        </div>
      ) : isJson ? (
        <div className="json-block">{content || '暂无数据'}</div>
      ) : (
        <textarea
          className="editable-content"
          value={content || ''}
          onChange={(e) => onContentChange(section.key, e.target.value)}
          placeholder="等待分析..."
        />
      )}
    </div>
  );
}

/* ================================================================
   Main App
   ================================================================ */

function App() {
  const standalone = useMemo(() => isStandalone(), []);

  // Upload state
  const [images, setImages] = useState([]);

  // Config state
  const [posterType, setPosterType] = useState('');
  const [size, setSize] = useState('');
  const [description, setDescription] = useState('');

  // Results state
  const [sections, setSections] = useState({});
  const [rawMarkdown, setRawMarkdown] = useState('');
  const [structuredData, setStructuredData] = useState(null);

  // Loading state
  const [globalLoading, setGlobalLoading] = useState(false);
  const [sectionLoading, setSectionLoading] = useState({});

  // Toast
  const [toast, setToast] = useState({ message: '', type: 'info', visible: false });

  const showToast = useCallback((message, type = 'info') => {
    setToast({ message, type, visible: true });
    setTimeout(() => setToast(t => ({ ...t, visible: false })), 2000);
  }, []);

  // Listen for parent config
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === 'pl-init' && e.data.config) {
        if (window.PromptLabConfig) {
          PromptLabConfig.set(e.data.config);
        }
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  // Image handlers
  const handleAddImages = useCallback(async (files) => {
    const newImages = await Promise.all(
      files.map(async (file) => ({
        file,
        preview: URL.createObjectURL(file),
        base64: await fileToBase64(file),
      }))
    );
    setImages(prev => [...prev, ...newImages].slice(0, 4));
  }, []);

  const handleRemoveImage = useCallback((index) => {
    setImages(prev => {
      const removed = prev[index];
      if (removed) URL.revokeObjectURL(removed.preview);
      return prev.filter((_, i) => i !== index);
    });
  }, []);

  // Cleanup object URLs on unmount
  useEffect(() => {
    return () => {
      images.forEach(img => URL.revokeObjectURL(img.preview));
    };
  }, []);

  // Build user message
  const buildUserText = useCallback(() => {
    let text = '';
    if (posterType) text += `海报类型倾向：${posterType}\n`;
    if (size) text += `尺寸需求：${size}\n`;
    if (description) text += `需求描述：${description}\n`;
    if (!text) text = '请根据参考图进行反推分析。';
    return text.trim();
  }, [posterType, size, description]);

  // Main analysis
  const handleAnalyze = useCallback(async () => {
    if (images.length === 0) {
      showToast('请先上传至少一张参考图', 'error');
      return;
    }

    setGlobalLoading(true);
    setSections({});
    setRawMarkdown('');
    setStructuredData(null);

    const userText = buildUserText();
    const imageUrls = images.map(img => img.base64);

    const result = await PipelineAPI.multimodal(SYSTEM_PROMPT, userText, imageUrls);

    if (result) {
      setRawMarkdown(result);
      const parsed = parseSections(result);
      setSections(parsed);

      // Extract JSON from the json section
      const jsonContent = parsed.json;
      if (jsonContent) {
        const data = extractJson(jsonContent);
        if (data) setStructuredData(data);
      }

      showToast('分析完成', 'success');
    } else {
      showToast('分析失败，请检查 API 配置', 'error');
    }

    setGlobalLoading(false);
  }, [images, buildUserText, showToast]);

  // Section re-generation
  const handleRegenerate = useCallback(async (sectionKey) => {
    if (images.length === 0) {
      showToast('请先上传参考图', 'error');
      return;
    }

    setSectionLoading(prev => ({ ...prev, [sectionKey]: true }));

    const regenPrompt = SECTION_REGEN_PROMPTS[sectionKey] || `请重新生成"${sectionKey}"部分。`;
    const focusedSystem = SYSTEM_PROMPT + '\n\n【本次任务】' + regenPrompt;
    const userText = buildUserText();
    const imageUrls = images.map(img => img.base64);

    const result = await PipelineAPI.multimodal(focusedSystem, userText, imageUrls);

    if (result) {
      if (sectionKey === 'json') {
        const jsonMatch = result.match(/```json\s*([\s\S]*?)```/);
        const content = jsonMatch
          ? '```json\n' + jsonMatch[1].trim() + '\n```'
          : result.trim();
        setSections(prev => ({ ...prev, [sectionKey]: content }));
        const data = extractJson(content);
        if (data) setStructuredData(data);
      } else {
        // Remove any leading markdown heading
        const cleaned = result.replace(/^##[^\n]*\n?/m, '').trim();
        setSections(prev => ({ ...prev, [sectionKey]: cleaned }));
      }
      showToast('已重新生成', 'success');
    } else {
      showToast('重新生成失败', 'error');
    }

    setSectionLoading(prev => ({ ...prev, [sectionKey]: false }));
  }, [images, buildUserText, showToast]);

  // Section content change (editable)
  const handleContentChange = useCallback((key, value) => {
    setSections(prev => ({ ...prev, [key]: value }));
  }, []);

  // Copy single section
  const handleCopySection = useCallback((key) => {
    const content = sections[key] || '';
    navigator.clipboard.writeText(content).then(() => {
      showToast('已复制到剪贴板', 'success');
    }).catch(() => {
      showToast('复制失败', 'error');
    });
  }, [sections, showToast]);

  // Copy all sections
  const handleCopyAll = useCallback(() => {
    const all = SECTION_DEFS.map(s => {
      const content = sections[s.key] || '';
      return `${s.icon} ${s.title}\n${'─'.repeat(40)}\n${content}`;
    }).join('\n\n');
    navigator.clipboard.writeText(all).then(() => {
      showToast('全部内容已复制', 'success');
    }).catch(() => {
      showToast('复制失败', 'error');
    });
  }, [sections, showToast]);

  // Export JSON
  const handleExportJson = useCallback(() => {
    if (!structuredData) {
      showToast('暂无可导出的 JSON 数据', 'error');
      return;
    }
    const blob = new Blob([JSON.stringify(structuredData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `skill-01-analysis-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('JSON 已导出', 'success');
  }, [structuredData, showToast]);

  // Save result
  const handleSave = useCallback(() => {
    const data = {
      images: images.map(img => ({ name: img.file?.name, preview: img.preview })),
      config: { posterType, size, description },
      sections,
      rawMarkdown,
      structuredData,
      savedAt: Date.now(),
    };

    // Save to PromptLabStore
    if (window.PromptLabStore) {
      PromptLabStore.setStepData('skill-01', { result: data });
    }

    // PostMessage to parent (dashboard iframe)
    window.parent.postMessage({
      type: 'skill-complete',
      skill: 1,
      data,
    }, '*');

    showToast('结果已保存', 'success');
  }, [images, posterType, size, description, sections, rawMarkdown, structuredData, showToast]);

  // Clear all
  const handleClear = useCallback(() => {
    images.forEach(img => URL.revokeObjectURL(img.preview));
    setImages([]);
    setPosterType('');
    setSize('');
    setDescription('');
    setSections({});
    setRawMarkdown('');
    setStructuredData(null);
    setSectionLoading({});
  }, [images]);

  const hasResults = Object.keys(sections).length > 0;

  return (
    <div style={{
      minHeight: standalone ? '100vh' : 'auto',
      display:'flex', flexDirection:'column',
    }}>
      {/* ── Header (standalone only) ── */}
      {standalone && (
        <header style={{
          background:'linear-gradient(135deg, #6366f1, #8b5cf6)',
          padding:'0 24px', height:'52px', display:'flex', alignItems:'center',
          justifyContent:'space-between', flexShrink:0,
          boxShadow:'0 2px 12px rgba(99,102,241,.3)', zIndex:100,
        }}>
          <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
            <a href="../../index.html" style={{
              color:'rgba(255,255,255,.7)', textDecoration:'none', fontSize:'13px',
              display:'flex', alignItems:'center', gap:'4px',
            }}>
              &larr; 返回工作台
            </a>
            <span style={{color:'rgba(255,255,255,.3)'}}>|</span>
            <span style={{fontSize:'18px'}}>🔍</span>
            <span style={{fontSize:'15px', fontWeight:'700', color:'#fff'}}>参考图反推</span>
            <span style={{
              background:'rgba(255,255,255,.15)', borderRadius:'6px',
              padding:'2px 8px', fontSize:'11px', color:'rgba(255,255,255,.7)',
            }}>Skill 01</span>
          </div>
          <button
            onClick={() => PromptLabConfig.renderSettingsModal()}
            style={{
              background:'rgba(255,255,255,.15)', border:'1px solid rgba(255,255,255,.2)',
              borderRadius:'8px', padding:'6px 14px', color:'#fff', fontSize:'13px',
              cursor:'pointer', display:'flex', alignItems:'center', gap:'6px',
            }}
          >
            ⚙️ API 设置
          </button>
        </header>
      )}

      {/* ── Main Content ── */}
      <div style={{
        flex:1, padding: standalone ? '24px' : '0',
        maxWidth:'900px', width:'100%', margin:'0 auto',
      }}>
        <div style={{display:'flex', flexDirection:'column', gap:'18px'}}>
          {/* Upload Zone */}
          <UploadZone images={images} onAdd={handleAddImages} onRemove={handleRemoveImage} />

          {/* Config Form */}
          <ConfigForm
            posterType={posterType} setPosterType={setPosterType}
            size={size} setSize={setSize}
            description={description} setDescription={setDescription}
          />

          {/* Action Buttons */}
          <div style={{display:'flex', gap:'10px', flexWrap:'wrap'}}>
            <button
              className="btn-gradient"
              onClick={handleAnalyze}
              disabled={globalLoading || images.length === 0}
            >
              {globalLoading ? (
                <>
                  <div className="pulse-loader" style={{gap:'4px'}}>
                    <span style={{width:'6px',height:'6px',background:'#fff'}}></span>
                    <span style={{width:'6px',height:'6px',background:'#fff'}}></span>
                    <span style={{width:'6px',height:'6px',background:'#fff'}}></span>
                  </div>
                  分析中...
                </>
              ) : '✨ 生成分析'}
            </button>
            <button className="btn-ghost" onClick={handleClear}>
              🗑️ 清空
            </button>
          </div>

          {/* ── Results ── */}
          {hasResults && (
            <div className="dark-card">
              <div style={{
                display:'flex', alignItems:'center', justifyContent:'space-between',
                marginBottom:'18px',
              }}>
                <div style={{fontSize:'14px', fontWeight:'600', color:'#aaa'}}>
                  📊 分析结果
                </div>
                <div style={{fontSize:'12px', color:'#555'}}>
                  {SECTION_DEFS.filter(s => sections[s.key]).length} / {SECTION_DEFS.length} 个版块
                </div>
              </div>

              <div style={{display:'flex', flexDirection:'column', gap:'14px'}}>
                {SECTION_DEFS.map(section => (
                  <SectionPanel
                    key={section.key}
                    section={section}
                    content={sections[section.key] || ''}
                    loading={!!sectionLoading[section.key]}
                    onContentChange={handleContentChange}
                    onRegenerate={handleRegenerate}
                    onCopy={handleCopySection}
                  />
                ))}
              </div>

              {/* Bottom Actions */}
              <div style={{
                display:'flex', gap:'10px', marginTop:'20px', flexWrap:'wrap',
                paddingTop:'16px', borderTop:'1px solid rgba(255,255,255,.06)',
              }}>
                <button className="btn-gradient" onClick={handleSave}>
                  💾 保存结果
                </button>
                <button className="btn-ghost" onClick={handleCopyAll}>
                  📋 复制全部
                </button>
                <button className="btn-ghost" onClick={handleExportJson}>
                  📥 导出JSON
                </button>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── Global Loading Overlay ── */}
      {globalLoading && (
        <div className="loader-overlay">
          <div className="pulse-loader" style={{gap:'8px', marginBottom:'16px'}}>
            <span style={{width:'12px',height:'12px'}}></span>
            <span style={{width:'12px',height:'12px'}}></span>
            <span style={{width:'12px',height:'12px'}}></span>
          </div>
          <div style={{fontSize:'15px', color:'#aaa', fontWeight:'500'}}>
            正在分析参考图...
          </div>
          <div style={{fontSize:'12px', color:'#555', marginTop:'6px'}}>
            需要调用 AI 模型，可能需要等待 10-30 秒
          </div>
        </div>
      )}

      {/* ── Toast ── */}
      <Toast message={toast.message} type={toast.type} visible={toast.visible} />
    </div>
  );
}

/* ================================================================
   Mount
   ================================================================ */

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
